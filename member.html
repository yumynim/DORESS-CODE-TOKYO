<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Members — DRESS CODE TOKYO</title>
  <meta name="description" content="DRESS CODE TOKYO の運用メンバー紹介。">
  <link rel="canonical" href="https://doress-code-tokyo-cip1.vercel.app/member.html">
  <link rel="icon" href="assets/images/logo-square.jpg">
  <link rel="apple-touch-icon" href="assets/images/logo-square.jpg">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="announce">
    <div class="announce__inner">
      <span><strong>NEXT — DRESS CODE MARKET VOL.1</strong></span>
      <span class="announce__sep">/</span>
      <span>Tokyo</span>
      <span class="announce__sep">/</span>
      <span>開催情報は近日公開</span>
    </div>
  </div>

  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="DRESS CODE TOKYO"></a>
      <nav id="nav-desktop" class="nav"></nav>
      <button type="button" class="btn btn--solid header__cta" data-auth-trigger>ログイン</button>
      <button id="menu-btn" class="menu-btn">MENU</button>
    </div>
    <div id="mobile-menu" class="mobile-menu">
      <div id="nav-mobile"></div>
      <button type="button" class="btn btn--solid" data-close data-auth-trigger>ログイン</button>
    </div>
  </header>

  <main class="mpage">
    <a class="mpage__back" href="index.html#members" onclick="event.preventDefault(); history.back()">← Members に戻る</a>
    <div class="mpage__head">
      <span class="kicker" id="m-role"></span>
      <h1 class="mpage__name" id="m-name"></h1>
      <div class="mpage__bio" id="m-bio"></div>
      <div class="mpage__cta">
        <a class="btn btn--solid" href="index.html#contact">この人に連絡する <span class="arrow">→</span></a>
      </div>
    </div>
    <div class="mpage__gallery" id="m-gallery"></div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__grid">
        <div>
          <div class="brand-serif">DRESS CODE</div>
          <div class="brand-sub">TOKYO</div>
          <p class="blurb">Tokyo Fashion Market &amp; Culture Community. ファッションをきっかけに、人とカルチャーが出会う場所。</p>
        </div>
        <div class="footer__col"><h4>Sitemap</h4><div id="footer-sitemap" class="links"></div></div>
        <div class="footer__col">
          <h4>Get involved</h4>
          <div class="links">
            <a href="index.html#event">来場について</a>
            <a href="index.html#community">コミュニティに参加する</a>
            <a href="index.html#members">運用メンバー</a>
            <a href="index.html#contact">お問い合わせ</a>
          </div>
        </div>
        <div class="footer__col"><div id="footer-socials"></div></div>
      </div>
      <div class="footer__bar">
        <span>© 2026 DRESS CODE TOKYO</span>
        <span>Wear your story. Meet the culture.</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <!-- 会員登録・ログイン（Supabase）。js/auth-config.js に接続情報を設定してください -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const S = window.SITE || {};
      const id = new URLSearchParams(location.search).get('id');
      const m = (S.members || []).find(x => x.slug === id) || (S.members || [])[0];
      if (!m) { document.getElementById('m-name').textContent = 'メンバーが見つかりませんでした'; return; }
      document.title = m.name + ' — DRESS CODE TOKYO';
      document.getElementById('m-role').textContent = m.role || '';
      document.getElementById('m-name').textContent = m.name || '';
      const esc = s => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      document.getElementById('m-bio').innerHTML = (m.bio || [m.intro || '']).map(p => `<p>${esc(p)}</p>`).join('');
      document.getElementById('m-gallery').innerHTML = (m.gallery || []).map(src => `<img src="${src}" alt="${esc(m.name)}" loading="lazy" decoding="async">`).join('');
      window.scrollTo(0, 0);
    })();
  </script>
</body>
</html>
